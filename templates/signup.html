{% extends "auth_base.html" %}

{% block title %}Sign Up — AIShopzone{% endblock %}

{% block auth_content %}
    <div class="auth-brand">
        <a class="brand" href="{{ url_for('product.index') }}"><span class="brand-mark">AI</span>Shopzone</a>
    </div>
    <h1>Create your account</h1>
    <p class="auth-sub">Join AIShopzone and start shopping smarter</p>

    <form method="post" action="{{ url_for('auth.signup') }}" novalidate>
        <div class="auth-field">
            <label for="name">Full Name</label>
            <input class="auth-input" type="text" id="name" name="name" placeholder="Jane Doe" required>
        </div>

        <div class="auth-field">
            <label for="email">Email</label>
            <input class="auth-input" type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>

        <div class="auth-field">
            <label for="password">Password</label>
            <input class="auth-input" type="password" id="password" name="password" placeholder="At least 6 characters" required>
        </div>

        <div class="auth-field">
            <label for="confirm">Confirm Password</label>
            <input class="auth-input" type="password" id="confirm" name="confirm" placeholder="Re-enter password" required>
        </div>

        <button class="btn-auth" type="submit">Create Account</button>
    </form>

    <div class="auth-divider">or</div>

    <button class="btn-google" id="googleBtn" type="button">
        <svg viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with Google
    </button>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
{% endblock %}
